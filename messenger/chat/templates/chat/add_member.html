{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="mb-0">Добавить участника в чат "{{ chat.name }}"</h3>
                </div>
                <div class="card-body">
                    {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Username пользователя</label>
                            <input type="text" name="username" class="form-control" required placeholder="Введите username">
                        </div>
                        <button type="submit" class="btn btn-primary">Добавить</button>
                        <a href="{% url 'chat:room' chat.id %}" class="btn btn-secondary">Отмена</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
