{% extends 'base.html' %}
{% block content %}
{% if is_admin %}
    <a href="{% url 'chat:add_member' chat.id %}" class="btn btn-sm btn-secondary mb-2">+ Добавить участника</a>
{% endif %}

<div class="mb-3">
    <strong>Участники:</strong>
    <div class="d-flex flex-wrap gap-2 mt-1">
        {% for member in chat.chatmember_set.all %}
            <span class="badge bg-secondary">{{ member.user.username }}</span>
        {% endfor %}
    </div>
</div>

<div class="card" style="height: 70vh; display: flex; flex-direction: column;">
    <div class="card-body overflow-auto" id="messages-container" style="flex: 1;">
        <div id="messages-list" class="messages-list"></div>
    </div>
    <div class="card-footer">
        <form id="message-form" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="input-group">
                <textarea id="text-input" class="form-control" placeholder="Сообщение..." rows="1" style="resize: none;"></textarea>
                <label for="file-input" class="btn btn-outline-secondary" style="cursor: pointer; font-size: 1.2rem;">🔗</label>
                <input type="file" id="file-input" multiple style="display:none;">
                <button type="submit" class="btn btn-primary">➤</button>
            </div>
            <div id="selected-files" class="selected-files mt-2"></div>
        </form>
    </div>
</div>

<style>
    .messages-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }
    .message {
        max-width: 75%;
        padding: 10px 14px;
        border-radius: 18px;
        word-break: break-word;
    }
    /* Свои сообщения – оранжевый */
    .message.sent {
        background: var(--cadmium, #FC6400);
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
    }
    /* Чужие сообщения – тёмно-серый */
    .message.received {
        background: #4a4a4a;
        color: #f0f0f0;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
    }
    /* Остальные стили (картинки, файлы) без изменений */
    .message img, .message video, .message audio {
        max-width: 100%;
        max-height: 300px;
        border-radius: 12px;
        margin: 8px 0;
    }
    .file-link {
        display: inline-block;
        margin-top: 5px;
        background: rgba(0,0,0,0.2);
        padding: 4px 8px;
        border-radius: 16px;
        font-size: 12px;
        text-decoration: none;
    }
    .selected-files {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
    }
    .file-preview-item {
        background: #e9ecef;
        padding: 4px 8px;
        border-radius: 16px;
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }
    .file-preview-item button {
        background: none;
        border: none;
        cursor: pointer;
        font-weight: bold;
        margin-left: 4px;
    }
</style>
{% endblock %}

{% block extra_js %}
<script>
    const currentUser = "{{ request.user.username }}";
    let lastMessageId = 0;
    const chatId = {{ chat.id }};
    let selectedFiles = [];

    // Предпросмотр файлов
    function updateFilePreview() {
        const container = document.getElementById('selected-files');
        container.innerHTML = '';
        selectedFiles.forEach((file, idx) => {
            const div = document.createElement('div');
            div.className = 'file-preview-item';
            if (file.type.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                img.style.height = '30px';
                div.appendChild(img);
            } else {
                div.textContent = `📎 ${file.name}`;
            }
            const removeBtn = document.createElement('button');
            removeBtn.textContent = '✕';
            removeBtn.onclick = () => {
                selectedFiles.splice(idx, 1);
                updateFilePreview();
            };
            div.appendChild(removeBtn);
            container.appendChild(div);
        });
    }

    document.getElementById('file-input').addEventListener('change', function(e) {
        if (e.target.files.length) {
            selectedFiles.push(...Array.from(e.target.files));
            updateFilePreview();
            this.value = ''; // сброс, чтобы можно было добавить те же файлы позже
        }
    });

    // Загрузка сообщений
    async function loadMessages() {
        try {
            const res = await fetch(`/chats/${chatId}/messages/?after=${lastMessageId}`);
            const data = await res.json();
            const container = document.getElementById('messages-list');
            data.messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.author === currentUser ? 'sent' : 'received'}`;
                let html = `<strong>${msg.author}</strong> <small>${new Date(msg.created_at).toLocaleTimeString('ru-RU')}</small>`;
                if (msg.text) html += `<p>${msg.text}</p>`;
                if (msg.attachments && msg.attachments.length) {
                    msg.attachments.forEach(att => {
                        if (att.file_type === 'image') {
                            html += `<a href="${att.file_url}" target="_blank"><img src="${att.file_url}" alt="attachment"></a>`;
                        } else if (att.file_type === 'video') {
                            html += `<video controls><source src="${att.file_url}" type="video/mp4"></video>`;
                        } else if (att.file_type === 'audio') {
                            html += `<audio controls><source src="${att.file_url}"></audio>`;
                        } else {
                            html += `<a href="${att.file_url}" download class="file-link">📎 ${att.original_name}</a>`;
                        }
                    });
                }
                div.innerHTML = html;
                container.appendChild(div);
                if (msg.id > lastMessageId) lastMessageId = msg.id;
            });
            document.getElementById('messages-container').scrollTop = document.getElementById('messages-container').scrollHeight;
        } catch(e) { console.error(e); }
    }

    // Отправка сообщения
    document.getElementById('message-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const text = document.getElementById('text-input').value.trim();
        if (!text && selectedFiles.length === 0) return;

        const formData = new FormData();
        if (text) formData.append('text', text);
        selectedFiles.forEach(file => formData.append('files', file));

        try {
            const res = await fetch(`{% url 'chat:send_message' chat.id %}`, {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                }
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Ошибка сервера');
            document.getElementById('text-input').value = '';
            selectedFiles = [];
            updateFilePreview();
            loadMessages();
        } catch (error) {
            console.error('Ошибка:', error);
            alert('Ошибка: ' + error.message);
        }
    });

    setInterval(loadMessages, 2000);
    loadMessages();
</script>
{% endblock %}
