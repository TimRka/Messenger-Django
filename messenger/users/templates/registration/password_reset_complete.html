{% extends 'base.html' %}

{% block title %}Пароль изменён{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3 class="text-center">Пароль изменён</h3>
            </div>
            <div class="card-body">
                <p>Ваш пароль был успешно изменён. Теперь вы можете войти с новым паролем.</p>
                <a href="{% url 'users:login' %}" class="btn btn-primary w-100">Войти</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
