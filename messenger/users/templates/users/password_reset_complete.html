{% extends 'base.html' %}
{% load static %}

{% block title %}Пароль изменён | Flame{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 text-center">
            <div class="card-body p-5">
                <div class="mb-4">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--golden)" stroke-width="1.5">
                        <path d="M20 6L9 17L4 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <h3 class="fw-bold" style="color: var(--golden);">Пароль изменён</h3>
                <div class="mx-auto mt-2 mb-3" style="width: 50px; height: 3px; background: var(--cadmium);"></div>
                <p class="text-muted">Ваш пароль успешно изменён. Теперь вы можете войти с новым паролем.</p>
                <a href="{% url 'users:login' %}" class="btn btn-primary btn-lg mt-3 px-4">Войти</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
