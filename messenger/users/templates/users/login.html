{% extends 'base.html' %}
{% load static %}

{% block title %}Вход | Flame{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-transparent border-0 text-center pt-4">
                <h2 class="fw-semibold" style="color: var(--golden);">Добро пожаловать</h2>
                <div class="mx-auto mt-2" style="width: 50px; height: 3px; background: var(--cadmium);"></div>
                <p class="text-muted mt-2">Войдите в аккаунт</p>
            </div>
            <div class="card-body px-4 pb-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label fw-semibold">Имя пользователя</label>
                        <input type="text" name="username" id="id_username" class="form-control form-control-lg" placeholder="Введите username" autofocus required>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label fw-semibold">Пароль</label>
                        <input type="password" name="password" id="id_password" class="form-control form-control-lg" placeholder="••••••••" required>
                    </div>
                    <div class="text-end mt-2">
                        <a href="{% url 'users:password_reset' %}" class="text-decoration-none small">Забыли пароль?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">Войти</button>
                </form>
                <hr class="my-4">
                <div class="text-center">
                    <p class="mb-0">Нет аккаунта? <a href="{% url 'users:signup' %}" class="fw-semibold">Зарегистрироваться</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
