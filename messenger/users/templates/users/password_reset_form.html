{% extends 'base.html' %}
{% load static %}

{% block title %}Сброс пароля | Flame{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-transparent border-0 text-center pt-4">
                <h3 class="fw-bold" style="color: var(--golden);">Сброс пароля</h3>
                <div class="mx-auto mt-2" style="width: 50px; height: 3px; background: var(--cadmium);"></div>
                <p class="text-muted mt-2">Введите email, и мы пришлём инструкции</p>
            </div>
            <div class="card-body px-4 pb-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_email" class="form-label fw-semibold">Email</label>
                        <input type="email" name="email" id="id_email" class="form-control form-control-lg" placeholder="example@domain.com" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">Отправить инструкцию</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{% url 'users:login' %}" class="text-decoration-none small">Вернуться ко входу</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
