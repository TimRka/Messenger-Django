{% extends 'base.html' %}
{% load static %}

{% block title %}Письмо отправлено | Flame{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 text-center">
            <div class="card-body p-5">
                <div class="mb-4">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--golden)" stroke-width="1.5">
                        <path d="M22 6L12 13L2 6M22 6v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6l10 7l10-7z"/>
                    </svg>
                </div>
                <h3 class="fw-bold" style="color: var(--golden);">Письмо отправлено</h3>
                <div class="mx-auto mt-2 mb-3" style="width: 50px; height: 3px; background: var(--cadmium);"></div>
                <p class="text-muted">Мы отправили инструкции по восстановлению пароля на вашу электронную почту.</p>
                <div class="alert alert-info mt-3">
                    Проверьте папку «Входящие» или «Спам».
                </div>
                <a href="{% url 'users:login' %}" class="btn btn-primary btn-lg mt-3 px-4">Вернуться ко входу</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
