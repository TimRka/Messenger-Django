{% extends 'base.html' %}
{% block title %}Персонализация{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card" style="background-color: #f8f9fa;">
            <div class="card-header">
                <h4 class="mb-0">Персонализация</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Тема оформления</label>
                        {{ form.theme }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Шрифт</label>
                        {{ form.font_family }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Размер шрифта</label>
                        <div class="input-group">
                            {{ form.font_size }}
                            <span class="input-group-text">px</span>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <button type="submit" class="btn btn-primary px-4">Сохранить</button>
                        <a href="{% url 'users:profile' %}" class="btn btn-outline-secondary px-4">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
