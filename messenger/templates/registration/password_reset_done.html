{% extends 'base.html' %}
{% block title %}Ссылка отправлена — Flame{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-7 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body text-center p-5">
                <h2 class="text-success mb-4">✅ Письмо отправлено</h2>
                
                <p class="lead mb-4">
                    Мы отправили инструкции по восстановлению пароля<br>
                    на вашу электронную почту.
                </p>
                
                <div class="alert alert-info">
                    Проверьте папку "Входящие" или "Спам".
                </div>

                <a href="{% url 'users:login' %}" class="btn btn-primary btn-lg px-5">
                    Вернуться ко входу
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
